<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>社交心理 · 消息回复的隐形压力 | 莫兰迪赛道·往返微粒</title>
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.5.0/dist/echarts.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        body {
            background: #efeae4;
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            color: #3e3a35;
            min-height: 100vh;
            overflow-x: hidden;
        }

        #particles-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
            opacity: 0.35;
        }

        .page {
            max-width: 1300px;
            margin: 0 auto;
            padding: 2rem 1.8rem;
            position: relative;
            z-index: 2;
        }

        .glass-card {
            background: rgba(253, 250, 245, 0.88);
            backdrop-filter: blur(4px);
            border-radius: 2rem;
            box-shadow: 0 12px 28px -10px rgba(0, 0, 0, 0.08);
            border: 1px solid rgba(210, 190, 170, 0.4);
        }

        .home-page {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 80vh;
        }

        .hero-card {
            background: rgba(253, 251, 247, 0.96);
            border-radius: 2.5rem;
            padding: 3rem 2.5rem;
            text-align: center;
            max-width: 760px;
            margin: 0 auto;
            border: 1px solid #e2d5ca;
        }

        .hero-title {
            font-size: 2.5rem;
            font-weight: 700;
            background: linear-gradient(120deg, #9b7fae, #c299b5, #7d9eb5);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            margin-bottom: 0.8rem;
        }

        .hero-sub {
            font-size: 1rem;
            color: #8a7b6e;
            border-left: 4px solid #e5d6cd;
            padding-left: 1rem;
            margin: 1rem auto;
            display: inline-block;
        }

        .hero-text {
            color: #6c6258;
            line-height: 1.55;
            margin: 1.5rem 0;
        }

        .start-btn {
            background: #d6c1b5;
            border: none;
            padding: 0.85rem 2rem;
            font-size: 1rem;
            font-weight: 600;
            color: white;
            border-radius: 48px;
            cursor: pointer;
            transition: 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            box-shadow: 0 5px 12px rgba(130, 100, 140, 0.25);
        }

        .start-btn:hover {
            background: #e5d6cd;
            transform: translateY(-3px);
        }

        .explore-page {
            display: none;
        }

        .explore-header {
            margin-bottom: 2rem;
        }

        .back-btn {
            background: #e4dbd1;
            border: none;
            padding: 0.5rem 1.2rem;
            border-radius: 40px;
            cursor: pointer;
            font-size: 0.85rem;
            color: #7c6a5a;
            font-weight: 500;
            transition: 0.2s;
        }

        .back-btn:hover {
            background: #cfbfb0;
            color: #fefaf5;
        }

        .cards-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(290px, 1fr));
            gap: 2rem;
            margin-top: 1.8rem;
        }

        .insight-card {
            background: rgba(255, 251, 245, 0.92);
            border-radius: 1.8rem;
            padding: 1.8rem 1.5rem;
            cursor: pointer;
            transition: all 0.3s ease;
            border: 1px solid #dfd3c7;
            text-align: center;
            backdrop-filter: blur(2px);
        }

        .insight-card:hover {
            transform: translateY(-6px);
            background: #fffaf3;
            border-color: #9a88a3;
            box-shadow: 0 15px 25px -10px rgba(100, 80, 110, 0.15);
        }

        .card-icon {
            font-size: 2.3rem;
            margin-bottom: 0.7rem;
        }

        .card-title {
            font-size: 1.4rem;
            font-weight: 600;
            color: #6b5b7c;
            margin-bottom: 0.5rem;
        }

        .card-desc {
            color: #8f7e6d;
            font-size: 0.85rem;
            line-height: 1.4;
            margin-bottom: 1rem;
        }

        .card-tag {
            background: #d6c1b5;
            padding: 0.25rem 1rem;
            border-radius: 40px;
            font-size: 0.7rem;
            color: #ffffff;
        }

        .chart-detail-page {
            display: none;
        }

        .chart-container {
            background: rgba(255, 252, 248, 0.92);
            border-radius: 2rem;
            padding: 1.5rem;
            margin-top: 1.5rem;
            backdrop-filter: blur(3px);
            border: 1px solid #e3d8ce;
        }

        .chart-header {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            flex-wrap: wrap;
            margin-bottom: 1rem;
            padding-bottom: 0.6rem;
            border-bottom: 2px solid #e1d3c8;
        }

        .chart-title {
            font-size: 1.5rem;
            font-weight: 650;
            color: #6d5a7c;
        }

        .chart-sub {
            color: #9a88a3;
            font-size: 0.8rem;
        }

        .chart-box {
            width: 100%;
            height: 520px;
        }

        .track-canvas {
            width: 100%;
            height: 520px;
            background: #fefaf5;
            border-radius: 1.8rem;
            box-shadow: inset 0 1px 6px rgba(0, 0, 0, 0.02), 0 4px 12px rgba(0, 0, 0, 0.03);
        }

        .footer-note {
            text-align: center;
            margin-top: 2rem;
            font-size: 0.7rem;
            color: #b6a596;
        }

        @media (max-width: 700px) {
            .hero-title { font-size: 1.9rem; }
            .cards-grid { grid-template-columns: 1fr; }
            .chart-box { height: 480px; }
            .track-canvas { height: 480px; }
        }
    </style>
</head>
<body>
<canvas id="particles-canvas"></canvas>
<div class="page">
    <div id="homePage" class="home-page">
        <div class="hero-card glass-card">
            <div class="hero-title">
                <i class="fas fa-comment-dots"></i> 消息回复的隐形压力
            </div>
            <div class="hero-sub">
                「数字时代的偏心」—— 即时弹窗 vs 深海沉船
            </div>
            <div class="hero-text">
                我们回复不同人的速度，揭示人际关系的"权力地图"。<br>
                基于真实聊天记录，分析 <strong>恋人 · 母女 · 朋友 · 师生 · 兄妹</strong> 五类关系。
            </div>
            <button class="start-btn" id="startBtn">
                <i class="fas fa-chart-line"></i> 开始探索
            </button>
        </div>
    </div>

    <div id="explorePage" class="explore-page">
        <div class="explore-header">
            <button class="back-btn" id="backToHomeBtn"><i class="fas fa-arrow-left"></i> 返回首页</button>
        </div>
        <div class="cards-grid">
            <div class="insight-card" data-chart="chart1">
                <div class="card-icon">📊</div>
                <div class="card-title">消息总量对比</div>
                <div class="card-desc">横向权力对比，谁占据了你社交能量的大头？<br>恋人·朋友·母女·师生·兄妹</div>
                <div class="card-tag">点击查看 →</div>
            </div>
            <div class="insight-card" data-chart="chart2">
                <div class="card-icon">⚖️</div>
                <div class="card-title">对话天平</div>
                <div class="card-desc">我的字数 vs 对方字数，谁倾注了更多语言？<br>横向百分比柱状图</div>
                <div class="card-tag">点击查看 →</div>
            </div>
            <div class="insight-card" data-chart="chart3">
                <div class="card-icon">🏁</div>
                <div class="card-title">心理阻力·赛道往返</div>
                <div class="card-desc">谁的消息你会秒回，谁的消息又常常石沉大海？<br>速度 = 回复速度，体积 = 对话数量</div>
                <div class="card-tag">点击查看 →</div>
            </div>
        </div>
    </div>

    <div id="detailPage" class="chart-detail-page">
        <div class="explore-header">
            <button class="back-btn" id="backToCardsBtn"><i class="fas fa-arrow-left"></i> 返回卡片</button>
        </div>
        <div id="detailContent"></div>
    </div>
</div>

<script>
    (function() {
        // 粒子背景
        const canvas = document.getElementById('particles-canvas');
        let ctx = canvas.getContext('2d');
        let width = window.innerWidth, height = window.innerHeight;
        let particles = [];

        function initParticles() {
            const colors = ['rgba(173, 150, 190, 0.3)', 'rgba(150, 170, 190, 0.3)', 'rgba(200, 165, 180, 0.3)', 'rgba(140, 175, 190, 0.25)'];
            for (let i = 0; i < 65; i++) {
                particles.push({
                    x: Math.random() * width,
                    y: Math.random() * height,
                    radius: Math.random() * 3 + 1.5,
                    speedX: (Math.random() - 0.5) * 0.2,
                    speedY: (Math.random() - 0.5) * 0.15,
                    color: colors[Math.floor(Math.random() * colors.length)]
                });
            }
        }

        function resizeCanvas() {
            width = window.innerWidth;
            height = window.innerHeight;
            canvas.width = width;
            canvas.height = height;
        }

        function drawParticles() {
            if (!ctx) return;
            ctx.clearRect(0, 0, width, height);
            for (let p of particles) {
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.radius, 0, Math.PI * 2);
                ctx.fillStyle = p.color;
                ctx.fill();
                p.x += p.speedX;
                p.y += p.speedY;
                if (p.x < -20) p.x = width + 20;
                if (p.x > width + 20) p.x = -20;
                if (p.y < -20) p.y = height + 20;
                if (p.y > height + 20) p.y = -20;
            }
            requestAnimationFrame(drawParticles);
        }

        function setupParticles() {
            resizeCanvas();
            initParticles();
            drawParticles();
            window.addEventListener('resize', () => {
                resizeCanvas();
                particles = [];
                initParticles();
            });
        }
        setupParticles();

        // 数据
        const relationData = [
            { name: "恋人", totalWords: 8475, myWords: 3759, theirWords: 4716, myRatio: 0.4435, avgDelaySec: 776.35 },
            { name: "朋友", totalWords: 846, myWords: 147, theirWords: 699, myRatio: 0.1738, avgDelaySec: 12585 },
            { name: "母女", totalWords: 775, myWords: 373, theirWords: 402, myRatio: 0.4813, avgDelaySec: 940 },
            { name: "师生", totalWords: 631, myWords: 246, theirWords: 385, myRatio: 0.3899, avgDelaySec: 2201.54 },
            { name: "兄妹", totalWords: 147, myWords: 99, theirWords: 48, myRatio: 0.6735, avgDelaySec: 3600 }
        ];

        // 球体半径映射
        const minWords = Math.min(...relationData.map(d => d.totalWords));
        const maxWords = Math.max(...relationData.map(d => d.totalWords));
        function getRadius(words) {
            const minR = 16, maxR = 34;
            if (maxWords === minWords) return 25;
            return minR + (words - minWords) / (maxWords - minWords) * (maxR - minR);
        }

        // 速度映射
        const delays = relationData.map(d => d.avgDelaySec);
        const maxDelay = Math.max(...delays);
        const minDelay = Math.min(...delays);
        function getSpeedPxPerFrame(delaySec) {
            let speedVal = 1.0 / (delaySec / 80 + 0.015);
            const maxRaw = 1.0 / (minDelay / 80 + 0.015);
            const minRaw = 1.0 / (maxDelay / 80 + 0.015);
            const norm = (speedVal - minRaw) / (maxRaw - minRaw);
            let finalSpeed = 0.9 + norm * 2.6;
            return Math.min(3.3, Math.max(0.9, finalSpeed));
        }

        let trackAnimation = null;
        let currentChart = null;
        let chart1CanvasAnimation = null;

        const homePage = document.getElementById('homePage');
        const explorePage = document.getElementById('explorePage');
        const detailPage = document.getElementById('detailPage');
        const detailContent = document.getElementById('detailContent');
        const startBtn = document.getElementById('startBtn');
        const backToHomeBtn = document.getElementById('backToHomeBtn');
        const backToCardsBtn = document.getElementById('backToCardsBtn');

        function showPage(pageName) {
            if (trackAnimation) {
                trackAnimation.stop();
                trackAnimation = null;
            }
            if (chart1CanvasAnimation) {
                cancelAnimationFrame(chart1CanvasAnimation);
                chart1CanvasAnimation = null;
            }
            homePage.style.display = 'none';
            explorePage.style.display = 'none';
            detailPage.style.display = 'none';
            if (pageName === 'home') homePage.style.display = 'flex';
            if (pageName === 'explore') explorePage.style.display = 'block';
            if (pageName === 'detail') detailPage.style.display = 'block';
        }

        // ========== 图表1：玻璃容器 + 小球堆积动画 ==========
        class GlassContainerChart {
            constructor(containerId, data) {
                this.container = document.getElementById(containerId);
                if (!this.container) return;
                this.data = data;
                this.canvas = null;
                this.ctx = null;
                this.animationId = null;
                this.ballPositions = {}; // 存储每个柱子的球体位置
                this.init();
            }
            
            init() {
                this.createCanvas();
                this.resize();
                window.addEventListener('resize', () => this.resize());
                this.generateBallPositions();
                this.startAnimation();
            }
            
            createCanvas() {
                this.container.innerHTML = '';
                this.canvas = document.createElement('canvas');
                this.canvas.style.width = '100%';
                this.canvas.style.height = '100%';
                this.canvas.style.display = 'block';
                this.canvas.style.borderRadius = '1.2rem';
                this.container.appendChild(this.canvas);
                this.ctx = this.canvas.getContext('2d');
            }
            
            resize() {
                const rect = this.container.getBoundingClientRect();
                this.canvas.width = rect.width;
                this.canvas.height = rect.height;
                this.width = this.canvas.width;
                this.height = this.canvas.height;
                this.generateBallPositions();
                this.draw();
            }
            
            generateBallPositions() {
                // 容器参数
                const barCount = this.data.length;
                const barWidth = Math.min(100, (this.width - 120) / barCount - 20);
                const startX = (this.width - (barCount * (barWidth + 20))) / 2 + 20;
                const containerBottom = this.height - 80;
                const containerTop = 60;
                const containerHeight = containerBottom - containerTop;
                
                // 计算每个柱子的最大球数（基于最大字数）
                const maxWordsVal = maxWords;
                
                this.ballPositions = {};
                
                this.data.forEach((item, idx) => {
                    const centerX = startX + idx * (barWidth + 20) + barWidth / 2;
                    const barLeft = centerX - barWidth / 2 + 10;
                    const barRight = centerX + barWidth / 2 - 10;
                    
                    // 球体半径：8-14px，让视觉更丰富
                    const ballRadius = 8;
                    // 根据字数比例计算球的数量（最多约60个球）
                    const wordRatio = item.totalWords / maxWordsVal;
                    const ballCount = Math.max(8, Math.min(45, Math.floor(wordRatio * 45)));
                    
                    const balls = [];
                    const cols = Math.floor((barRight - barLeft) / (ballRadius * 2.2));
                    const effectiveCols = Math.max(3, cols);
                    
                    for (let i = 0; i < ballCount; i++) {
                        const col = i % effectiveCols;
                        const row = Math.floor(i / effectiveCols);
                        const x = barLeft + col * (ballRadius * 2.2) + ballRadius;
                        const y = containerBottom - row * (ballRadius * 2.2) - ballRadius;
                        if (y > containerTop + ballRadius) {
                            balls.push({
                                x: x,
                                y: y,
                                targetY: y,
                                radius: ballRadius,
                                phase: Math.random() * Math.PI * 2
                            });
                        }
                    }
                    
                    this.ballPositions[idx] = {
                        balls: balls,
                        centerX: centerX,
                        barWidth: barWidth,
                        containerTop: containerTop,
                        containerBottom: containerBottom,
                        wordCount: item.totalWords,
                        name: item.name
                    };
                });
            }
            
            drawGlassContainer(x, y, width, height, opacity = 0.85) {
                const ctx = this.ctx;
                const radius = 12;
                
                // 玻璃容器主体
                ctx.beginPath();
                ctx.moveTo(x + radius, y);
                ctx.lineTo(x + width - radius, y);
                ctx.quadraticCurveTo(x + width, y, x + width, y + radius);
                ctx.lineTo(x + width, y + height - radius);
                ctx.quadraticCurveTo(x + width, y + height, x + width - radius, y + height);
                ctx.lineTo(x + radius, y + height);
                ctx.quadraticCurveTo(x, y + height, x, y + height - radius);
                ctx.lineTo(x, y + radius);
                ctx.quadraticCurveTo(x, y, x + radius, y);
                ctx.closePath();
                
                // 玻璃半透明填充
                ctx.fillStyle = `rgba(220, 210, 230, ${opacity * 0.3})`;
                ctx.fill();
                
                // 玻璃边框
                ctx.strokeStyle = 'rgba(180, 160, 190, 0.7)';
                ctx.lineWidth = 2;
                ctx.stroke();
                
                // 玻璃高光效果
                ctx.beginPath();
                ctx.moveTo(x + 5, y + 5);
                ctx.lineTo(x + width - 10, y + 5);
                ctx.strokeStyle = 'rgba(255, 255, 255, 0.5)';
                ctx.lineWidth = 1.5;
                ctx.stroke();
                
                // 底部阴影
                ctx.beginPath();
                ctx.moveTo(x + 3, y + height - 3);
                ctx.lineTo(x + width - 3, y + height - 3);
                ctx.strokeStyle = 'rgba(140, 120, 160, 0.3)';
                ctx.lineWidth = 2;
                ctx.stroke();
            }
            
            draw() {
                if (!this.ctx || !this.width) return;
                this.ctx.clearRect(0, 0, this.width, this.height);
                
                // 背景
                this.ctx.fillStyle = '#fefaf5';
                this.ctx.fillRect(0, 0, this.width, this.height);
                
                // 绘制标题
                this.ctx.font = '600 16px "Inter"';
                this.ctx.fillStyle = '#6d5a7c';
                this.ctx.textAlign = 'center';
                this.ctx.fillText('📊 消息总量对比 · 玻璃容器中的情感颗粒', this.width / 2, 35);
                
                this.ctx.font = '12px "Inter"';
                this.ctx.fillStyle = '#9a88a3';
                this.ctx.fillText('柱子越高 = 对话越频繁 · 小球越多 = 情感投入越深', this.width / 2, 55);
                
                // 绘制每个玻璃容器
                for (let idx in this.ballPositions) {
                    const bp = this.ballPositions[idx];
                    const containerX = bp.centerX - bp.barWidth / 2;
                    const containerWidth = bp.barWidth;
                    const containerHeight = bp.containerBottom - bp.containerTop;
                    
                    // 绘制玻璃容器
                    this.drawGlassContainer(containerX, bp.containerTop, containerWidth, containerHeight, 0.9);
                    
                    // 绘制小球
                    for (let ball of bp.balls) {
                        // 微微浮动效果
                        const floatY = ball.y + Math.sin(Date.now() * 0.002 + ball.phase) * 1.5;
                        
                        const grad = this.ctx.createRadialGradient(ball.x - 2, floatY - 2, 2, ball.x, floatY, ball.radius);
                        grad.addColorStop(0, '#c9b3d0');
                        grad.addColorStop(1, '#a07faa');
                        
                        this.ctx.beginPath();
                        this.ctx.arc(ball.x, floatY, ball.radius - 1, 0, Math.PI * 2);
                        this.ctx.fillStyle = grad;
                        this.ctx.fill();
                        this.ctx.shadowBlur = 0;
                    }
                    
                    // 绘制容器底部标签
                    this.ctx.font = '600 13px "Inter"';
                    this.ctx.fillStyle = '#6d5a7c';
                    this.ctx.textAlign = 'center';
                    this.ctx.fillText(bp.name, bp.centerX, bp.containerBottom + 25);
                    
                    // 显示字数
                    this.ctx.font = '11px monospace';
                    this.ctx.fillStyle = '#9a88a3';
                    this.ctx.fillText(`${bp.wordCount}字`, bp.centerX, bp.containerBottom + 42);
                }
            }
            
            startAnimation() {
                const animate = () => {
                    this.draw();
                    this.animationId = requestAnimationFrame(animate);
                };
                this.animationId = requestAnimationFrame(animate);
            }
            
            stop() {
                if (this.animationId) {
                    cancelAnimationFrame(this.animationId);
                    this.animationId = null;
                }
            }
        }
        
        function renderChart1(containerId) {
            const container = document.getElementById(containerId);
            if (!container) return null;
            const chart = new GlassContainerChart(containerId, relationData);
            return chart;
        }

        // 图表2
        function renderChart2(containerId) {
            const dom = document.getElementById(containerId);
            if (!dom) return null;
            const chart = echarts.init(dom);
            const myPercent = relationData.map(d => d.myRatio * 100);
            const theirPercent = relationData.map(d => (1 - d.myRatio) * 100);
            chart.setOption({
                tooltip: { trigger: 'axis', axisPointer: { type: 'shadow' }, formatter: function(params) {
                    const idx = params[0].dataIndex;
                    const data = relationData[idx];
                    return `<strong>${data.name}</strong><br/>📝 我: ${data.myWords} 字 (${(data.myRatio*100).toFixed(1)}%)<br/>👥 对方: ${data.theirWords} 字 (${((1-data.myRatio)*100).toFixed(1)}%)`;
                } },
                grid: { left: '12%', right: '8%', top: '12%', bottom: '8%', containLabel: true },
                xAxis: { type: 'value', name: '字数占比 (%)', max: 100, axisLabel: { formatter: '{value}%' } },
                yAxis: { type: 'category', data: relationData.map(d => d.name), axisLabel: { fontWeight: 500, color: '#7a6a85' } },
                legend: { data: ['我 ', '对方 '], left: 'left', textStyle: { color: '#9b89a3' } },
                series: [
                    { name: '我 ', type: 'bar', stack: 'total', data: myPercent, itemStyle: { color: '#eed3da', borderRadius: [0, 6, 6, 0], label: { show: true, position: 'right', formatter: p => p.value.toFixed(1)+'%' } } },
                    { name: '对方 ', type: 'bar', stack: 'total', data: theirPercent, itemStyle: { color: '#ced6df', borderRadius: [6, 0, 0, 6], label: { show: true, position: 'left', formatter: p => p.value.toFixed(1)+'%' } } }
                ]
            });
            return chart;
        }

        // ========== 赛道往返动画 ==========
        class TrackRacer {
            constructor(canvasId, data) {
                this.canvas = document.getElementById(canvasId);
                if (!this.canvas) return;
                this.ctx = this.canvas.getContext('2d');
                this.data = data;
                this.tracks = [];
                this.animationId = null;
                this.init();
            }
            init() {
                this.resize();
                window.addEventListener('resize', () => this.resize());
                this.buildTracks();
                this.startAnimation();
            }
            resize() {
                const container = this.canvas.parentElement;
                if (!container) return;
                const rect = container.getBoundingClientRect();
                this.canvas.width = rect.width;
                this.canvas.height = rect.height;
                this.width = this.canvas.width;
                this.height = this.canvas.height;
                this.updateTrackPositions();
                this.draw();
            }
            buildTracks() {
                const order = [...this.data];
                const palette = ['#c49c99', '#d1b7b8', '#c7c1cb', '#dbcbc2', '#e8ddd8'];
                
                this.tracks = order.map((item, idx) => {
                    const radius = getRadius(item.totalWords);
                    const speed = getSpeedPxPerFrame(item.avgDelaySec);
                    return {
                        name: item.name,
                        delaySec: item.avgDelaySec,
                        totalWords: item.totalWords,
                        radius: radius,
                        speed: speed,
                        direction: 1,
                        posX: 0,
                        y: 0,
                        startX: 70,
                        endX: 0,
                        trackHeight: 0,
                        color: palette[idx % palette.length],
                        labelColor: '#6d5c7c'
                    };
                });
            }
            updateTrackPositions() {
                const trackCount = this.tracks.length;
                const topMargin = 55;
                const bottomMargin = 45;
                const availableHeight = this.height - topMargin - bottomMargin;
                const trackHeight = availableHeight / trackCount;
                
                for (let i = 0; i < this.tracks.length; i++) {
                    const t = this.tracks[i];
                    const centerY = topMargin + i * trackHeight + trackHeight / 2;
                    t.y = centerY;
                    t.trackHeight = trackHeight * 0.6;
                    t.startX = 70;
                    t.endX = this.width - 70;
                    const range = t.endX - t.startX;
                    t.range = range;
                    
                    if (t.posX === 0 || isNaN(t.posX)) {
                        t.posX = t.startX + range * 0.3;
                    }
                    if (t.posX < t.startX) t.posX = t.startX;
                    if (t.posX > t.endX) t.posX = t.endX;
                }
            }
            draw() {
                if (!this.ctx || !this.width) return;
                this.ctx.clearRect(0, 0, this.width, this.height);
                this.ctx.fillStyle = '#fefaf5';
                this.ctx.fillRect(0, 0, this.width, this.height);
                
                for (let t of this.tracks) {
                    const lineY = t.y;
                    this.ctx.beginPath();
                    this.ctx.moveTo(t.startX, lineY);
                    this.ctx.lineTo(t.endX, lineY);
                    this.ctx.strokeStyle = '#d9cdc0';
                    this.ctx.lineWidth = 2.5;
                    this.ctx.setLineDash([8, 12]);
                    this.ctx.stroke();
                    this.ctx.setLineDash([]);
                    
                    this.ctx.beginPath();
                    this.ctx.arc(t.startX, lineY, 7, 0, 2 * Math.PI);
                    this.ctx.fillStyle = '#e7dbcf';
                    this.ctx.fill();
                    this.ctx.beginPath();
                    this.ctx.arc(t.endX, lineY, 7, 0, 2 * Math.PI);
                    this.ctx.fill();
                    
                    this.ctx.font = `600 14px "Inter"`;
                    this.ctx.fillStyle = t.labelColor;
                    this.ctx.fillText(t.name, 12, lineY + 5);
                    
                    const delayText = t.delaySec > 3600 ? `${(t.delaySec/3600).toFixed(1)}h` : `${t.delaySec.toFixed(0)}s`;
                    this.ctx.font = `11px monospace`;
                    this.ctx.fillStyle = '#aa9bae';
                    this.ctx.fillText(`回复延迟 ${delayText}`, this.width - 95, lineY + 5);
                    
                    const x = t.posX;
                    const radius = t.radius;
                    const grad = this.ctx.createRadialGradient(x-4, lineY-4, 3, x, lineY, radius);
                    grad.addColorStop(0, t.color);
                    grad.addColorStop(1, this.darkenColor(t.color));
                    this.ctx.shadowColor = 'rgba(0,0,0,0.1)';
                    this.ctx.shadowBlur = 6;
                    this.ctx.beginPath();
                    this.ctx.arc(x, lineY, radius, 0, 2 * Math.PI);
                    this.ctx.fillStyle = grad;
                    this.ctx.fill();
                    this.ctx.strokeStyle = '#fff6ed';
                    this.ctx.lineWidth = 1.5;
                    this.ctx.stroke();
                    this.ctx.shadowBlur = 0;
                    
                    this.ctx.font = `${Math.max(9, Math.min(12, radius/3.2))}px "Inter"`;
                    this.ctx.fillStyle = '#fef7e8';
                    this.ctx.fillText(`${t.totalWords}`, x-4, lineY+4);
                }
            }
            darkenColor(color) {
                return color;
            }
            updatePositions() {
                for (let t of this.tracks) {
                    let newX = t.posX + t.speed * t.direction;
                    if (newX >= t.endX) {
                        newX = t.endX - (newX - t.endX);
                        t.direction = -1;
                    }
                    if (newX <= t.startX) {
                        newX = t.startX + (t.startX - newX);
                        t.direction = 1;
                    }
                    t.posX = Math.min(t.endX, Math.max(t.startX, newX));
                }
            }
            animate() {
                this.updatePositions();
                this.draw();
            }
            startAnimation() {
                const step = () => {
                    this.animate();
                    this.animationId = requestAnimationFrame(step);
                };
                this.animationId = requestAnimationFrame(step);
            }
            stop() {
                if (this.animationId) {
                    cancelAnimationFrame(this.animationId);
                    this.animationId = null;
                }
            }
        }
