<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>社交心理 · 消息回复的隐形压力 | 莫兰迪赛道·往返微粒</title>
    <!-- ECharts CDN (用于图表1和2) -->
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.5.0/dist/echarts.min.js"></script>
    <!-- 字体与图标 -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        body {
            background: #f2ede8;  /* 莫兰迪暖灰基底 */
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            color: #3e3a35;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* 柔和粒子背景 (莫兰迪氛围) */
        #particles-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
            opacity: 0.4;
        }

        .page {
            max-width: 1300px;
            margin: 0 auto;
            padding: 2rem 1.8rem;
            position: relative;
            z-index: 2;
        }

        /* 通用玻璃卡片 */
        .glass-card {
            background: rgba(253, 250, 245, 0.86);
            backdrop-filter: blur(4px);
            border-radius: 2rem;
            box-shadow: 0 12px 28px -10px rgba(0, 0, 0, 0.08);
            border: 1px solid rgba(210, 190, 170, 0.4);
            transition: all 0.25s;
        }

        /* 首页 */
        .home-page {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 80vh;
        }

        .hero-card {
            background: rgba(253, 251, 247, 0.96);
            border-radius: 2.5rem;
            padding: 3rem 2.5rem;
            text-align: center;
            max-width: 760px;
            margin: 0 auto;
            border: 1px solid #e2d5ca;
        }

        .hero-title {
            font-size: 2.5rem;
            font-weight: 700;
            background: linear-gradient(120deg, #9b7fae, #c299b5, #7d9eb5);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            margin-bottom: 0.8rem;
        }

        .hero-sub {
            font-size: 1rem;
            color: #8a7b6e;
            border-left: 4px solid #b9a2cd;
            padding-left: 1rem;
            margin: 1rem auto;
            display: inline-block;
        }

        .hero-text {
            color: #6c6258;
            line-height: 1.55;
            margin: 1.5rem 0;
        }

        .start-btn {
            background: #b6a2c6;
            border: none;
            padding: 0.85rem 2rem;
            font-size: 1rem;
            font-weight: 600;
            color: white;
            border-radius: 48px;
            cursor: pointer;
            transition: 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            box-shadow: 0 5px 12px rgba(130, 100, 140, 0.25);
        }

        .start-btn:hover {
            background: #9f89b3;
            transform: translateY(-3px);
        }

        /* 探索卡片页 */
        .explore-page {
            display: none;
        }

        .explore-header {
            margin-bottom: 2rem;
        }

        .back-btn {
            background: #e4dbd1;
            border: none;
            padding: 0.5rem 1.2rem;
            border-radius: 40px;
            cursor: pointer;
            font-size: 0.85rem;
            color: #7c6a5a;
            font-weight: 500;
            transition: 0.2s;
        }

        .back-btn:hover {
            background: #cfbfb0;
            color: #fefaf5;
        }

        .cards-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(290px, 1fr));
            gap: 2rem;
            margin-top: 1.8rem;
        }

        .insight-card {
            background: rgba(255, 251, 245, 0.92);
            border-radius: 1.8rem;
            padding: 1.8rem 1.5rem;
            cursor: pointer;
            transition: all 0.3s ease;
            border: 1px solid #dfd3c7;
            text-align: center;
            backdrop-filter: blur(2px);
        }

        .insight-card:hover {
            transform: translateY(-6px);
            background: #fffaf3;
            border-color: #cfbcdb;
            box-shadow: 0 15px 25px -10px rgba(100, 80, 110, 0.15);
        }

        .card-icon {
            font-size: 2.3rem;
            margin-bottom: 0.7rem;
        }

        .card-title {
            font-size: 1.4rem;
            font-weight: 600;
            color: #6b5b7c;
            margin-bottom: 0.5rem;
        }

        .card-desc {
            color: #8f7e6d;
            font-size: 0.85rem;
            line-height: 1.4;
            margin-bottom: 1rem;
        }

        .card-tag {
            background: #ede3e9;
            padding: 0.25rem 1rem;
            border-radius: 40px;
            font-size: 0.7rem;
            color: #9a7faa;
        }

        /* 图表详情页 */
        .chart-detail-page {
            display: none;
        }

        .chart-container {
            background: rgba(255, 252, 248, 0.92);
            border-radius: 2rem;
            padding: 1.5rem;
            margin-top: 1.5rem;
            backdrop-filter: blur(3px);
            border: 1px solid #e3d8ce;
        }

        .chart-header {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            flex-wrap: wrap;
            margin-bottom: 1rem;
            padding-bottom: 0.6rem;
            border-bottom: 2px solid #e1d3c8;
        }

        .chart-title {
            font-size: 1.5rem;
            font-weight: 650;
            color: #6d5a7c;
        }

        .chart-sub {
            color: #b59dbb;
            font-size: 0.8rem;
        }

        .chart-box {
            width: 100%;
            height: 460px;
        }

        /* 赛道画布 */
        .track-canvas {
            width: 100%;
            height: 520px;
            background: #fefaf5;
            border-radius: 1.8rem;
            box-shadow: inset 0 1px 6px rgba(0, 0, 0, 0.02), 0 4px 12px rgba(0, 0, 0, 0.03);
        }

        .footer-note {
            text-align: center;
            margin-top: 2rem;
            font-size: 0.7rem;
            color: #b6a596;
        }

        @media (max-width: 700px) {
            .hero-title { font-size: 1.9rem; }
            .cards-grid { grid-template-columns: 1fr; }
            .chart-box { height: 360px; }
            .track-canvas { height: 460px; }
        }
    </style>
</head>
<body>
<canvas id="particles-canvas"></canvas>
<div class="page">
    <!-- 首页 -->
    <div id="homePage" class="home-page">
        <div class="hero-card glass-card">
            <div class="hero-title">
                <i class="fas fa-comment-dots"></i> 消息回复的隐形压力
            </div>
            <div class="hero-sub">
                「数字时代的偏心」—— 即时弹窗 vs 深海沉船
            </div>
            <div class="hero-text">
                我们回复不同人的速度，揭示人际关系的“权力地图”。<br>
                基于真实聊天记录，分析 <strong>恋人 · 母女 · 朋友 · 师生 · 兄妹</strong> 五类关系。
            </div>
            <button class="start-btn" id="startBtn">
                <i class="fas fa-chart-line"></i> 开始探索
            </button>
        </div>
    </div>

    <!-- 卡片选择页 -->
    <div id="explorePage" class="explore-page">
        <div class="explore-header">
            <button class="back-btn" id="backToHomeBtn"><i class="fas fa-arrow-left"></i> 返回首页</button>
        </div>
        <div class="cards-grid">
            <div class="insight-card" data-chart="chart1">
                <div class="card-icon">📊</div>
                <div class="card-title">消息总量对比</div>
                <div class="card-desc">横向权力对比，谁占据了你社交能量的大头？<br>恋人·朋友·母女·师生·兄妹</div>
                <div class="card-tag">点击查看 →</div>
            </div>
            <div class="insight-card" data-chart="chart2">
                <div class="card-icon">⚖️</div>
                <div class="card-title">对话天平</div>
                <div class="card-desc">我的字数 vs 对方字数，谁倾注了更多语言？<br>横向百分比柱状图</div>
                <div class="card-tag">点击查看 →</div>
            </div>
            <div class="insight-card" data-chart="chart3">
                <div class="card-icon">🏁</div>
                <div class="card-title">心理阻力·赛道往返</div>
                <div class="card-desc">五条横向赛道，小球匀速往返运动。<br>速度 = 回复速度(延迟倒数)，球体大小 = 情感质量</div>
                <div class="card-tag">点击查看动态赛道 →</div>
            </div>
        </div>
    </div>

    <!-- 图表详情页 -->
    <div id="detailPage" class="chart-detail-page">
        <div class="explore-header">
            <button class="back-btn" id="backToCardsBtn"><i class="fas fa-arrow-left"></i> 返回卡片</button>
        </div>
        <div id="detailContent"></div>
    </div>
</div>

<script>
    (function() {
        // ---------- 莫兰迪粒子背景 (粉蓝紫氛围) ----------
        const canvas = document.getElementById('particles-canvas');
        let ctx = canvas.getContext('2d');
        let width = window.innerWidth, height = window.innerHeight;
        let particles = [];

        function initParticles() {
            const colors = ['rgba(173, 150, 190, 0.3)', 'rgba(150, 170, 190, 0.3)', 'rgba(200, 165, 180, 0.3)', 'rgba(140, 175, 190, 0.25)'];
            for (let i = 0; i < 65; i++) {
                particles.push({
                    x: Math.random() * width,
                    y: Math.random() * height,
                    radius: Math.random() * 3 + 1.5,
                    alpha: Math.random() * 0.35 + 0.1,
                    speedX: (Math.random() - 0.5) * 0.2,
                    speedY: (Math.random() - 0.5) * 0.15,
                    color: colors[Math.floor(Math.random() * colors.length)]
                });
            }
        }

        function resizeCanvas() {
            width = window.innerWidth;
            height = window.innerHeight;
            canvas.width = width;
            canvas.height = height;
        }

        function drawParticles() {
            if (!ctx) return;
            ctx.clearRect(0, 0, width, height);
            for (let p of particles) {
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.radius, 0, Math.PI * 2);
                ctx.fillStyle = p.color;
                ctx.fill();
                p.x += p.speedX;
                p.y += p.speedY;
                if (p.x < -20) p.x = width + 20;
                if (p.x > width + 20) p.x = -20;
                if (p.y < -20) p.y = height + 20;
                if (p.y > height + 20) p.y = -20;
            }
            requestAnimationFrame(drawParticles);
        }

        function setupParticles() {
            resizeCanvas();
            initParticles();
            drawParticles();
            window.addEventListener('resize', () => {
                resizeCanvas();
                particles = [];
                initParticles();
            });
        }
        setupParticles();

        // ---------- 核心数据 ----------
        const relationData = [
            { name: "恋人", totalWords: 8475, myWords: 3759, theirWords: 4716, myRatio: 0.4435, avgDelaySec: 776.35 },
            { name: "朋友", totalWords: 846, myWords: 147, theirWords: 699, myRatio: 0.1738, avgDelaySec: 12585 },
            { name: "母女", totalWords: 775, myWords: 373, theirWords: 402, myRatio: 0.4813, avgDelaySec: 940 },
            { name: "师生", totalWords: 631, myWords: 246, theirWords: 385, myRatio: 0.3899, avgDelaySec: 2201.54 },
            { name: "兄妹", totalWords: 147, myWords: 99, theirWords: 48, myRatio: 0.6735, avgDelaySec: 3600 }
        ];

        // 球体半径映射 (差异缩小，符合要求：差距小一点)
        const minWords = Math.min(...relationData.map(d => d.totalWords));
        const maxWords = Math.max(...relationData.map(d => d.totalWords));
        function getRadius(words) {
            const minR = 14, maxR = 36;   // 体积差距柔和
            if (maxWords === minWords) return 24;
            return minR + (words - minWords) / (maxWords - minWords) * (maxR - minR);
        }

        // 速度映射：回复速度 = 1 / 延迟 (归一化后映射到像素/帧速率)
        // 为了让视觉差异明显但不过分，使用 maxDelay 做倒数后映射速度范围 0.9 ~ 3.2 像素/帧 (60fps下流畅)
        const delays = relationData.map(d => d.avgDelaySec);
        const maxDelay = Math.max(...delays);
        const minDelay = Math.min(...delays);
        function getSpeedPxPerFrame(delaySec) {
            // 回复速度与延迟成反比，延迟越大速度越慢
            let speedVal = 1.0 / (delaySec / 100 + 0.02);
            // 归一化映射到 0.7 ~ 3.0 区间，使差异明显但不过于极端
            const maxRaw = 1.0 / (minDelay / 100 + 0.02);
            const minRaw = 1.0 / (maxDelay / 100 + 0.02);
            const norm = (speedVal - minRaw) / (maxRaw - minRaw);
            const finalSpeed = 0.9 + norm * 2.4;
            return Math.min(3.2, Math.max(0.85, finalSpeed));
        }

        // 赛道往返动画管理器
        let trackAnimation = null;
        let currentChart = null;
        
        // 页面元素
        const homePage = document.getElementById('homePage');
        const explorePage = document.getElementById('explorePage');
        const detailPage = document.getElementById('detailPage');
        const detailContent = document.getElementById('detailContent');
        const startBtn = document.getElementById('startBtn');
        const backToHomeBtn = document.getElementById('backToHomeBtn');
        const backToCardsBtn = document.getElementById('backToCardsBtn');

        function showPage(pageName) {
            if (trackAnimation) {
                trackAnimation.stop();
                trackAnimation = null;
            }
            homePage.style.display = 'none';
            explorePage.style.display = 'none';
            detailPage.style.display = 'none';
            if (pageName === 'home') homePage.style.display = 'flex';
            if (pageName === 'explore') explorePage.style.display = 'block';
            if (pageName === 'detail') detailPage.style.display = 'block';
        }

        // 图表1: 消息总量柱状图
        function renderChart1(containerId) {
            const dom = document.getElementById(containerId);
            if (!dom) return null;
            const chart = echarts.init(dom);
            chart.setOption({
                tooltip: { trigger: 'axis', formatter: p => `<strong>${p[0].name}</strong><br/>📨 总字数: ${p[0].value} 字` },
                grid: { left: '8%', right: '5%', top: '12%', bottom: '5%', containLabel: true },
                xAxis: { type: 'category', data: relationData.map(d => d.name), axisLabel: { fontWeight: 500, color: '#7a6a85' } },
                yAxis: { type: 'value', name: '总字数 (字符)', nameTextStyle: { color: '#9a88a3' } },
                series: [{
                    type: 'bar', data: relationData.map(d => d.totalWords),
                    itemStyle: { borderRadius: [10,10,0,0], color: '#b9a2cd', label: { show: true, position: 'top', fontWeight: 'bold', color: '#7a6392' } }
                }]
            });
            return chart;
        }

        // 图表2: 横向百分比堆叠 (莫兰迪粉紫)
        function renderChart2(containerId) {
            const dom = document.getElementById(containerId);
            if (!dom) return null;
            const chart = echarts.init(dom);
            const myPercent = relationData.map(d => d.myRatio * 100);
            const theirPercent = relationData.map(d => (1 - d.myRatio) * 100);
            chart.setOption({
                tooltip: { trigger: 'axis', axisPointer: { type: 'shadow' }, formatter: function(params) {
                    const idx = params[0].dataIndex;
                    const data = relationData[idx];
                    return `<strong>${data.name}</strong><br/>📝 我: ${data.myWords} 字 (${(data.myRatio*100).toFixed(1)}%)<br/>👥 对方: ${data.theirWords} 字 (${((1-data.myRatio)*100).toFixed(1)}%)`;
                } },
                grid: { left: '12%', right: '8%', top: '12%', bottom: '8%', containLabel: true },
                xAxis: { type: 'value', name: '字数占比 (%)', max: 100, axisLabel: { formatter: '{value}%' } },
                yAxis: { type: 'category', data: relationData.map(d => d.name), axisLabel: { fontWeight: 500, color: '#7a6a85' } },
                legend: { data: ['我 (主动倾注)', '对方 (回应/主导)'], left: 'left', textStyle: { color: '#9b89a3' } },
                series: [
                    { name: '我 (主动倾注)', type: 'bar', stack: 'total', data: myPercent, itemStyle: { color: '#a7b9cd', borderRadius: [0, 6, 6, 0], label: { show: true, position: 'right', formatter: p => p.value.toFixed(1)+'%' } } },
                    { name: '对方 (回应/主导)', type: 'bar', stack: 'total', data: theirPercent, itemStyle: { color: '#dcb5c5', borderRadius: [6, 0, 0, 6], label: { show: true, position: 'left', formatter: p => p.value.toFixed(1)+'%' } } }
                ]
            });
            return chart;
        }

        // ========== 核心: 五条横向赛道 + 匀速往返小球 ==========
        class TrackPendulumRacer {
            constructor(canvasId, data) {
                this.canvas = document.getElementById(canvasId);
                if (!this.canvas) return;
                this.ctx = this.canvas.getContext('2d');
                this.data = data;
                this.tracks = [];
                this.animationId = null;
                this.init();
            }
            init() {
                this.resize();
                window.addEventListener('resize', () => this.resize());
                this.buildTracks();
                this.startAnimation();
            }
            resize() {
                const container = this.canvas.parentElement;
                if (!container) return;
                const rect = container.getBoundingClientRect();
                this.canvas.width = rect.width;
                this.canvas.height = 520;
                this.width = this.canvas.width;
                this.height = this.canvas.height;
                this.updateTrackDimensions();
                this.drawStatic();
            }
            updateTrackDimensions() {
                if (!this.tracks.length) return;
                const trackCount = this.tracks.length;
                const topMargin = 65;
                const bottomMargin = 55;
                const availableHeight = this.height - topMargin - bottomMargin;
                const trackHeight = Math.max(38, availableHeight / trackCount - 6);
                let yStart = topMargin;
                for (let i = 0; i < this.tracks.length; i++) {
                    this.tracks[i].y = yStart;
                    this.tracks[i].trackHeight = trackHeight;
                    this.tracks[i].startX = 55;
                    this.tracks[i].endX = this.width - 55;
                    const range = this.tracks[i].endX - this.tracks[i].startX;
                    this.tracks[i].range = range;
                    // 确保小球位置在边界内
                    if (this.tracks[i].posX === undefined) this.tracks[i].posX = this.tracks[i].startX + range * 0.3;
                    else {
                        // 重新映射位置比例
                        let t = (this.tracks[i].posX - this.tracks[i].startXPrev) / (this.tracks[i].rangePrev || range);
                        if (isNaN(t)) t = 0.3;
                        this.tracks[i].posX = this.tracks[i].startX + t * range;
                    }
                    this.tracks[i].startXPrev = this.tracks[i].startX;
                    this.tracks[i].rangePrev = range;
                    // 方向重置避免出界
                    if (this.tracks[i].posX < this.tracks[i].startX) this.tracks[i].posX = this.tracks[i].startX;
                    if (this.tracks[i].posX > this.tracks[i].endX) this.tracks[i].posX = this.tracks[i].endX;
                }
                this.drawStatic();
            }
            buildTracks() {
                // 使用延迟排序，使视觉上更有层次
                const sorted = [...this.data].sort((a,b) => b.avgDelaySec - a.avgDelaySec);
                const palette = ['#8eb3c7', '#c4a5cf', '#e1b7c7', '#b7c9e2', '#d9b8d4']; // 蓝粉紫莫兰迪
                this.tracks = sorted.map((item, idx) => {
                    const radius = getRadius(item.totalWords);
                    const speed = getSpeedPxPerFrame(item.avgDelaySec);
                    return {
                        name: item.name,
                        delaySec: item.avgDelaySec,
                        totalWords: item.totalWords,
                        radius: radius,
                        speed: speed,          // 像素/帧 (约60fps)
                        direction: 1,          // 1向右 -1向左
                        posX: 0,
                        y: 0,
                        startX: 55,
                        endX: 0,
                        range: 0,
                        color: palette[idx % palette.length],
                        labelColor: '#6d5c7c'
                    };
                });
            }
            drawStatic() {
                if (!this.ctx || !this.width) return;
                // 背景底色
                this.ctx.fillStyle = '#fefaf5';
                this.ctx.fillRect(0, 0, this.width, this.height);
                // 绘制每条赛道
                for (let t of this.tracks) {
                    const midY = t.y + t.trackHeight / 2;
                    // 赛道线条
                    this.ctx.beginPath();
                    this.ctx.moveTo(t.startX, midY);
                    this.ctx.lineTo(t.endX, midY);
                    this.ctx.strokeStyle = '#d9cdc0';
                    this.ctx.lineWidth = 2.5;
                    this.ctx.setLineDash([8, 12]);
                    this.ctx.stroke();
                    this.ctx.setLineDash([]);
                    // 赛道两端装饰
                    this.ctx.beginPath();
                    this.ctx.arc(t.startX, midY, 6, 0, 2 * Math.PI);
                    this.ctx.fillStyle = '#e7dbcf';
                    this.ctx.fill();
                    this.ctx.beginPath();
                    this.ctx.arc(t.endX, midY, 6, 0, 2 * Math.PI);
                    this.ctx.fill();
                    
                    // 标签文字
                    this.ctx.font = `600 14px "Inter"`;
                    this.ctx.fillStyle = t.labelColor;
                    this.ctx.shadowBlur = 0;
                    this.ctx.fillText(t.name, 12, midY + 5);
                    // 右侧显示延迟数值
                    const delayText = t.delaySec > 3600 ? `${(t.delaySec/3600).toFixed(1)}h` : `${t.delaySec.toFixed(0)}s`;
                    this.ctx.font = `11px monospace`;
                    this.ctx.fillStyle = '#aa9bae';
                    this.ctx.fillText(`回复延迟 ${delayText}`, this.width - 90, midY + 5);
                }
            }
            updatePositions() {
                for (let t of this.tracks) {
                    let newX = t.posX + t.speed * t.direction;
                    if (newX >= t.endX) {
                        newX = t.endX - (newX - t.endX);
                        t.direction = -1;
                    }
                    if (newX <= t.startX) {
                        newX = t.startX + (t.startX - newX);
                        t.direction = 1;
                    }
                    t.posX = Math.min(t.endX, Math.max(t.startX, newX));
                }
            }
            drawBalls() {
                for (let t of this.tracks) {
                    const midY = t.y + t.trackHeight / 2;
                    const x = t.posX;
                    const radius = t.radius;
                    // 球体渐变
                    const grad = this.ctx.createRadialGradient(x-4, midY-4, 3, x, midY, radius);
                    grad.addColorStop(0, t.color);
                    grad.addColorStop(1, this.darkenColor(t.color));
                    this.ctx.shadowColor = 'rgba(0,0,0,0.1)';
                    this.ctx.shadowBlur = 6;
                    this.ctx.beginPath();
                    this.ctx.arc(x, midY, radius, 0, 2 * Math.PI);
                    this.ctx.fillStyle = grad;
                    this.ctx.fill();
                    this.ctx.strokeStyle = '#fff6ed';
                    this.ctx.lineWidth = 1.5;
                    this.ctx.stroke();
                    this.ctx.shadowBlur = 0;
                    // 小球内文字(字数/情感)
                    this.ctx.font = `${Math.max(9, Math.min(12, radius/3.2))}px "Inter"`;
                    this.ctx.fillStyle = '#fef7e8';
                    this.ctx.fillText(`${t.totalWords}`, x-4, midY+4);
                }
            }
            darkenColor(color) {
                // 简单变暗用于渐变
                return color;
            }
            animateFrame() {
                this.updatePositions();
                this.drawStatic();
                this.drawBalls();
            }
            startAnimation() {
                const step = () => {
                    this.animateFrame();
                    this.animationId = requestAnimationFrame(step);
                };
                this.animationId = requestAnimationFrame(step);
            }
            stop() {
                if (this.animationId) {
                    cancelAnimationFrame(this.animationId);
                    this.animationId = null;
                }
            }
        }

        function renderChart3(containerId) {
            const container = document.getElementById(containerId);
            if (!container) return;
            container.innerHTML = `<canvas id="trackCanvas" class="track-canvas" style="width:100%; height:520px; display:block;"></canvas>`;
            trackAnimation = new TrackPendulumRacer('trackCanvas', relationData);
        }

        function renderDetailChart(chartType) {
            detailContent.innerHTML = `
                <div class="chart-container">
                    <div class="chart-header">
                        <div class="chart-title">${chartType === 'chart1' ? '📊 消息总量对比' : chartType === 'chart2' ? '⚖️ 对话天平' : '🏁 心理阻力 · 赛道往返'}</div>
                        <div class="chart-sub">${chartType === 'chart1' ? '横向权力对比，社交能量分布' : chartType === 'chart2' ? '横向占比：我 vs 对方' : '小球速度 = 回复速度(延迟倒数)，体积 = 情感质量'}</div>
                    </div>
                    <div id="dynamicChart" class="chart-box"></div>
                </div>
            `;
            setTimeout(() => {
                if (currentChart && currentChart.dispose) currentChart.dispose();
                if (chartType === 'chart1') currentChart = renderChart1('dynamicChart');
                else if (chartType === 'chart2') currentChart = renderChart2('dynamicChart');
                else if (chartType === 'chart3') renderChart3('dynamicChart');
                window.dispatchEvent(new Event('resize'));
            }, 80);
        }

        // 绑定事件
        if (startBtn) startBtn.onclick = () => showPage('explore');
        if (backToHomeBtn) backToHomeBtn.onclick = () => showPage('home');
        if (backToCardsBtn) backToCardsBtn.onclick = () => showPage('explore');
        document.querySelectorAll('.insight-card').forEach(card => {
            card.addEventListener('click', (e) => {
                const type = card.getAttribute('data-chart');
                renderDetailChart(type);
                showPage('detail');
            });
        });
        showPage('home');
    })();
</script>
</body>
